<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hledat | Mimo Trasu</title>
  <meta name="description" content="Vyhledávání článků na Mimo Trasu">
  <meta name="theme-color" content="#000000"/>

  <link rel="icon" href="/img/favicon.png" type="image/png"/>
  <link rel="canonical" href="https://mimotrasu.cz/hledat.html"/>

  <style>
    :root{ --bg:#000; --fg:#f5f5f5; --muted:#a9a9a9; --accent:#ff7e00; }
    html,body{background:var(--bg);color:var(--fg);margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    main{max-width:900px;margin:0 auto;padding:3rem 1rem 5rem}
    h1{font-weight:300;text-transform:uppercase;letter-spacing:.12rem;margin:0 0 .6rem;text-align:center}
   
/* podtitul bíle */
.sub{
  color:#f5f5f5;            /* bíla */
  text-align:center;
  margin:0 0 1.2rem;
}

/* jen text MIMO TRASU oranžově */
.sub .accent{
  color:var(--accent);      /* #ff7e00 */
  font-weight:600;
}
    .searchbar{
      position:sticky;top:0;z-index:9;background:linear-gradient(#000, rgba(0,0,0,.75));
      padding:1rem 0 1.2rem;border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:saturate(120%) blur(4px);
    }
    .searchbar form{max-width:900px;margin:0 auto;display:flex;gap:.6rem;align-items:center;padding:0 1rem}
    .input{
      flex:1; display:flex; align-items:center; gap:.5rem;
      border:1px solid rgba(255,255,255,.12); border-radius:999px; padding:.65rem .9rem; background:rgba(255,255,255,.04)
    }
    .input input{
      flex:1; background:transparent; border:0; outline:0; color:var(--fg); font-size:1.05rem;
    }
    /* schovat nativní X v search inputu */
    input[type="search"]::-webkit-search-cancel-button{ -webkit-appearance:none; appearance:none; display:none; }
    input[type="search"]::-ms-clear{ display:none; width:0; height:0; }

/* nech šedou defaultně */
.input svg{ width:20px; height:20px; color: var(--muted); }
/* a při aktivitě pole přepni na oranžovou */
.input:focus-within svg{ color: var(--accent); }

  .btn-clear{
  appearance:none;
  background:transparent;
  border:0;
  width:28px; height:28px;                /* pohodlná klik zóna */
  display:inline-grid; place-items:center;
  color:var(--accent);                     /* #ff7e00 */
  cursor:pointer;
  opacity:.95; transition:opacity .15s ease;
}
.btn-clear:hover{ opacity:1; }
.btn-clear.hidden{ opacity:0; pointer-events:none; }


    .stats{color:var(--muted); font-size:.95rem; margin:.7rem 1rem 0}
    .results{margin:1.2rem 0 0; display:grid; gap:1rem; padding:0 1rem}

    /* Karta: jemný „3D“ vzhled */
    .card{
      border:1px solid rgba(255,255,255,.09);
      border-radius:12px;
      padding:1rem .95rem;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow:
        0 1px 0 rgba(255,255,255,.04) inset,
        0 6px 16px rgba(0,0,0,.35);
      transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .card:hover,
    .card:focus-within{
      transform: translateY(-2px);
      border-color: rgba(255,126,0,.6);
      box-shadow:
        0 0 0 2px rgba(255,126,0,.08),
        0 10px 22px rgba(0,0,0,.45);
    }

    .card a.title{
      color:#fff; text-decoration:none; font-size:1.15rem; font-weight:600; letter-spacing:.2px;
      display:block; margin-top:.15rem;
    }
    .meta{ color:var(--muted); font-size:.9rem; margin-top:.25rem }
    .desc{ color:#ddd; margin:.35rem 0 0; }

    mark{
      background:transparent; color:var(--accent); font-weight:800; text-shadow:0 0 10px rgba(255,126,0,.25);
    }
    .nores{text-align:center;color:var(--muted);margin:2.2rem 0 0}
    .footerlink{display:block;text-align:center;margin:2rem 0 0}
   .footerlink a{
  color:#f5f5f5;
  text-decoration:none;              /* žádné podtržení */
}
.footerlink a:visited{
  color:#f5f5f5;                      /* drž barvu i po návštěvě */
}
.footerlink a:hover,
.footerlink a:focus,
.footerlink a:active{
  text-decoration:none;               /* ani na hover/focus */
  opacity:.9;                         /* jemňoučká odezva (klidně smaž) */
}

.footerlink a .accent{
  color:var(--accent);                /* jen MIMO TRASU oranžově (#ff7e00) */
  font-weight:600;
}

/* volitelné: jemné zvýraznění při hoveru */
.footerlink a:hover{
  text-decoration:underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}


    @media (max-width:640px){
      main{padding:2rem 1rem 4rem}
      .results{padding:0}
    }
/* Zpět na rozcestník – bez podtržení za každých okolností */
.footerlink a,
.footerlink a:link,
.footerlink a:visited,
.footerlink a:hover,
.footerlink a:active{
  text-decoration: none !important;
  text-decoration-line: none !important;
  -webkit-text-decoration: none !important;
  border-bottom: 0 !important; /* kdyby někde byl “link = border-bottom” trik */
  color:#f5f5f5;               /* bíle */
}

.footerlink a .accent{
  color: var(--accent);         /* jen “MIMO TRASU” oranžově (#ff7e00) */
  font-weight: 600;
}

/* kontejner + podpis (menší, bez podsvícení) */
.footerlink{
  text-align:center;
  margin:2rem 0 0;
}
.footerlink .signature{
  margin-top:.6rem;
  display:flex;
  justify-content:center;
}
.footerlink .signature img{
  width: clamp(80px, 22vw, 130px); /* menší, responsivní */
  height:auto;
  display:block;
  border:0;
  box-shadow:none;
  filter:none;
  opacity:1;
  transition:none;
}
/* zruš případné staré hover efekty */
.footerlink:hover .signature img{
  box-shadow:none !important;
  filter:none !important;
  transform:none !important;
}
/* podpis – menší, bez stínů (ponechávám i předchozí velikost) */
.footerlink .signature{ margin-top:.6rem; display:flex; justify-content:center; }
.footerlink .signature img{
  width: clamp(80px, 22vw, 130px);
  height:auto; display:block; border:0; box-shadow:none; filter:none; opacity:1;
}

/* anti-save „best effort“ */
.no-save{ position:relative; -webkit-touch-callout:none; user-select:none; -webkit-user-select:none; }
.no-save img{ pointer-events:none; -webkit-user-drag:none; }
.no-save::after{
  content:""; position:absolute; inset:0; /* průhledný překryv, chytá interakce */
}
/* SCHOVAT nativní křížky ve všech stavech (Chrome/Edge/Safari/iOS) */
input[type="search"]::-webkit-search-cancel-button,
input[type="search"]::-webkit-search-decoration,
input[type="search"]::-webkit-search-results-button,
input[type="search"]::-webkit-search-results-decoration{
  display:none !important;
}
input[type="search"]{
  -webkit-appearance:none; /* iOS Safari */
  appearance:none;
}

/* NÁŠ oranžový křížek (ať ho nic nepřebarví) */
.input{ position:relative; } /* pro absolutní pozici X */
.btn-clear{
  position:absolute; right:.35rem; top:50%; transform:translateY(-50%);
  width:28px; height:28px; display:inline-grid; place-items:center;
  background:transparent; border:0; cursor:pointer;
  color:var(--accent) !important; /* #ff7e00 natvrdo */
  opacity:.95; transition:opacity .15s ease;
}
.btn-clear:hover{ opacity:1; }
.btn-clear.hidden{ opacity:0; pointer-events:none; }

  </style>
</head>
<body>
  <main>
  <h1>HLEDEJ.</h1>
<p class="sub">
  Vytáhni z  <span class="accent">„MIMO TRASU“</span>  to, co potřebuješ.
</p>

    <div class="searchbar">
      <form id="f" role="search" aria-label="Hledání">
        <div class="input">
          <!-- lupa -->
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.3 6.3 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6.2 0A4.8 4.8 0 1 1 14.1 9.2a4.8 4.8 0 0 1-4.8 4.8z"/></svg>
          <input id="q" name="q" type="search" placeholder="Hledej: disciplína, stoicismus, půst…" autocomplete="off" spellcheck="false" />
          <button class="btn-clear hidden" type="button" id="clear" title="Smazat" aria-label="Smazat">✕</button>
        </div>
      </form>
      <div class="stats" id="stats"></div>
    </div>

  <section class="results" id="results" aria-live="polite"></section>
<div class="nores" id="nores" style="display:none">Tady jsi opravdu už moc mimo trasu. Vrať se.</div>

<div class="footerlink">
  <a href="index.html">← Zpět na rozcestník <span class="accent">„MIMO TRASU“</span></a>
  <div class="signature no-save">
    <img src="/img/martin-oranzovy.png"
         alt="Martin — podpis Mimo Trasu"
         loading="lazy" decoding="async" draggable="false">
  </div>
</div>


  </main>

<script>
(function(){
  const $ = sel => document.querySelector(sel);
  const resultsEl = $('#results');
  const statsEl   = $('#stats');
  const input     = $('#q');
  const clearBtn  = $('#clear');

  // utilitky
  const norm = s => (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,''); // bez diakritiky
  const tokens = q => norm(q).trim().split(/\s+/).filter(Boolean);
  const escapeHtml = s => (s||'').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
  const hi = (text, qs) => {
    let t = escapeHtml(text||'');
    qs.forEach(w=>{
      if(!w) return;
      const rx = new RegExp('('+w.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\$&')+')','gi');
      t = t.replace(rx,'<mark>$1</mark>');
    });
    return t;
  };

  // bezpečný href: preferuje url, ale odfiltruje FS cesty a padá na path
  const isFsPath = u => !!u && (/^([a-zA-Z]:[\\/]|\/(data|var|srv)\/)/.test(u) || String(u).toLowerCase().startsWith('file:'));
  const safeHref = (it) => {
    let u = it.url || '';
    if (!u || isFsPath(u)) u = it.path || '';
    try{
      const abs = new URL(u, location.origin);
      return (abs.origin === location.origin) ? (abs.pathname + abs.search + abs.hash) : abs.href;
    }catch{ return u || '#'; }
  };

  let INDEX = [];
  let READY = false;
  const CACHE_KEY = 'mt_search_index_v7'; // bump pro jistotu

  async function fetchIndexFresh(){
    // 1) zkus s cache-bustem
    try{
      const r = await fetch('/search.json?v=' + Date.now(), { cache:'no-store' });
      if (r.ok) return await r.json();
    }catch(e){}
    // 2) fallback bez parametru
    const r2 = await fetch('/search.json', { cache:'no-store' });
    if (!r2.ok) throw new Error('Nelze načíst /search.json');
    return await r2.json();
  }

  async function loadIndex(){
    if (READY) return;
    statsEl.textContent = 'Načítám index…';
    // localStorage → rychlejší start
    try{
      const cached = localStorage.getItem(CACHE_KEY);
      if(cached){
        INDEX = JSON.parse(cached);
        prepareHay();
        READY = true;
        statsEl.textContent = '';
        return;
      }
    }catch(e){}

    try{
      const data = await fetchIndexFresh();
      INDEX = (data.items || []).map(it => {
        const p = (it.path || it.url || '').toLowerCase();
        return {
          title: it.title || it.h1 || '',
          url:   it.url   || '',
          path:  it.path  || '',
          description: it.desc || '',
          keywords: it.keywords || [],
          date: it.date || '',
          category:
            p.includes('red-pill') ? 'Red Pill' :
            p.includes('stoic')    ? 'Stoicismus' :
            p.includes('cvicen')   ? 'Cvičení' :
            p.includes('memento')  ? 'Memento Mori' :
            p.includes('foto')     ? 'Fotopříběh' : ''
        };
      });
      try{ localStorage.setItem(CACHE_KEY, JSON.stringify(INDEX)); }catch(e){}
      prepareHay();
      READY = true;
      statsEl.textContent = '';
    }catch(err){
      statsEl.textContent = 'Chyba při načítání indexu: ' + (err && err.message ? err.message : err);
      INDEX = [];
      READY = true; // ať jde psát a vidíš 0 výsledků místo nic
    }
  }

  function prepareHay(){
    INDEX.forEach(it=>{
      const join = [it.title, it.description, (it.keywords||[]).join(' '), it.category].join(' ');
      it._hay = norm(join);
    });
  }

  // skórování (OR)
  function search(q){
    const qs = tokens(q);
    if(!qs.length) return {list:[], qs};
    const scored = INDEX.map(it=>{
      let s = 0;
      for(const w of qs){
        if (norm(it.title).includes(w))       s += 5;
        if (norm(it.description).includes(w)) s += 3;
        if ((it.keywords||[]).some(k => norm(k).includes(w))) s += 2;
        if (norm(it.category).includes(w))    s += 1;
      }
      return {...it, _score: s};
    }).filter(it=> it._score > 0);

    const toTs = d => { const t = Date.parse(d); return isNaN(t)? 0 : t; };
    scored.sort((a,b)=> (b._score - a._score) || (toTs(b.date) - toTs(a.date)));
    return {list: scored, qs};
  }

  function render(found){
    const {list, qs} = found;
    if(!qs.length){
      resultsEl.innerHTML=''; statsEl.textContent=''; $('#nores').style.display='none'; return;
    }
    statsEl.textContent = `${list.length} nalezeno`;
    if(!list.length){ resultsEl.innerHTML=''; $('#nores').style.display='block'; return; }
    $('#nores').style.display='none';

    const html = list.map(it => {
      const title = hi(it.title, qs);
      const desc  = hi(it.description || '', qs);
      const meta  = [it.category, (it.keywords||[]).slice(0,3).join(', ')].filter(Boolean).join(' · ');
      const href  = safeHref(it);

      return `
        <article class="card">
          <a class="title" href="${href}" target="_blank" rel="noopener noreferrer">${title}</a>
          ${meta ? `<div class="meta">${escapeHtml(meta)}</div>`:''}
          ${desc ? `<p class="desc">${desc}</p>`:''}
        </article>`;
    }).join('');
    resultsEl.innerHTML = html;
  }

  function updateClear(){ clearBtn.classList.toggle('hidden', !input.value); }

  async function doSearch(){
    await loadIndex();
    render(search(input.value));
  }

  let t=null;
  input.addEventListener('input', ()=>{ clearTimeout(t); t=setTimeout(doSearch, 140); updateClear(); });
  $('#f').addEventListener('submit', e=>{ e.preventDefault(); doSearch(); });
  clearBtn.addEventListener('click', ()=>{ input.value=''; updateClear(); doSearch(); input.focus(); });

  const params = new URLSearchParams(location.search);
  const qInit = params.get('q')||'';
  if(qInit){ input.value = qInit; }
  updateClear();

  doSearch();
})();
</script>
<script>
  // vypnout context menu a drag nad podpisem
  document.addEventListener('DOMContentLoaded', ()=>{
    document.querySelectorAll('.no-save').forEach(el=>{
      el.addEventListener('contextmenu', e=> e.preventDefault());
      el.addEventListener('dragstart',  e=> e.preventDefault());
      el.addEventListener('pointerdown',e=> {
        // zkus potlačit dlouhý tap menu na mobilech
        e.target.style.touchAction = 'none';
      }, {passive:true});
    });
  });
</script>

</body>
</html>
