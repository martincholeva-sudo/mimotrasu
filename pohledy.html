<!DOCTYPE html>
<html lang="cs">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohledy | MIMO TRASU</title>
    <meta name="description" content="Svět mýma očima. Fotografie a postřehy zachycené skrz objektiv Canon EOS 2000D na cestách mimo vyšlapané trasy.">
    <style>
        body { 
            background-color: #000; 
            color: #ccc; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            line-height: 1.6;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        
        nav { padding: 25px 15px; text-align: center; }
        nav a { 
            color: #fff; 
            text-decoration: none; 
            margin: 0 15px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.75rem; 
            transition: color 0.3s;
            font-weight: 300;
        }
        nav a:hover { color: #ff7e00; }
        
        .header-image { 
            height: 25vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 0 20px;
        }
        
        h1 { 
            color: #ff7e00; 
            text-transform: uppercase; 
            letter-spacing: clamp(4px, 2vw, 8px); 
            font-weight: 300; 
            margin: 0; 
            font-size: clamp(2rem, 8vw, 3.5rem);
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 15px 60px 15px; 
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .grid-item {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #111;
            aspect-ratio: 1 / 1;
            border: 1px solid #111;
            transition: border-color 0.4s;
        }
        
        .grid-item:hover { border-color: #ff7e00; }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .grid-item:hover img {
            filter: grayscale(20%);
            transform: scale(1.05);
        }

        .protection-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            background: transparent;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            grid-template-rows: 1fr auto auto 1fr; /* Přidán řádek pro flexibilitu */
            align-items: center;
            justify-items: center;
            padding: 20px;
        }

        .lightbox.active { display: grid; }

        .lightbox-content {
            grid-row: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
        }

        .lightbox img {
            max-width: 95vw;
            max-height: 70vh;
            width: auto;
            height: auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid #222;
            pointer-events: none;
            object-fit: contain;
        }

        .lightbox-caption {
            color: #ff7e00;
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            font-weight: 300;
            max-width: 90%;
            line-height: 1.4;
        }

        .close-btn {
            position: absolute;
            top: 20px; 
            right: 25px;
            color: #fff; 
            font-size: 35px; 
            cursor: pointer;
            z-index: 1010;
            background: rgba(255,126,0,0.2);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        #backToTop {
            display: none;
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 99;
            border: 1px solid rgba(255, 126, 0, 0.3);
            background: rgba(17, 17, 17, 0.5);
            color: rgba(255, 126, 0, 0.7);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 4px;
        }

        footer { 
            text-align: center; 
            padding: 60px 20px; 
            color: #444; 
            font-size: 0.8rem;
            border-top: 1px solid #111;
        }

        /* SPECIFICKÉ ÚPRAVY PRO MOBIL */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 5px;
            }
            .container { padding: 5px; }
            
            .lightbox {
                padding: 10px;
                grid-template-rows: 0.5fr auto auto 0.5fr; /* Více místa pro obsah */
            }

            .lightbox img {
                max-width: 100vw;
                max-height: 60vh; /* Zmenšení fotky na mobilu, aby zbyl čas na text */
            }

            .lightbox-caption {
                font-size: 0.85rem; /* Menší písmo popisku na mobilu */
                margin-top: 10px;
                letter-spacing: 1px;
                padding-bottom: 20px;
            }

            .close-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 28px;
            }
        }

        /* Úprava pro mobil na šířku */
        @media (max-height: 500px) and (orientation: landscape) {
            .lightbox img { max-height: 55vh; }
            .lightbox-caption { font-size: 0.75rem; margin-top: 5px; }
            .header-image { height: 40vh; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<button onclick="scrollToTop()" id="backToTop" title="Nahoru">↑</button>

<nav>
    <a href="index.html">Zpět na úvod</a>
</nav>

<header class="header-image">
    <h1>Pohledy</h1>
</header>

<div class="container">
    <div class="grid">
        <div class="grid-item" onclick="openLightbox('img/2026.05.01 - Barrandovske terasy (12).jpg?v=1', 'Barrandovské terasy – ozvěny minulosti')">
            <div class="protection-layer"></div>
            <img src="img/2026.05.01 - Barrandovske terasy (12).jpg?v=1" alt="Barrandov" draggable="false">
        </div>

        <div class="grid-item" onclick="openLightbox('img/2026.04.11 - pupen.jpg?v=1', 'Nová síla. Trpělivost v detailech')">
            <div class="protection-layer"></div>
            <img src="img/2026.04.11 - pupen.jpg?v=1" alt="Pupen" draggable="false">
        </div>

        <div class="grid-item" onclick="openLightbox('img/1000029836.jpg?v=1', 'Klid na hladině. Západ slunce nad Vltavou')">
            <div class="protection-layer"></div>
            <img src="img/1000029836.jpg?v=1" alt="Vltava" draggable="false">
        </div>

        <div class="grid-item" onclick="openLightbox('img/2025.11.17 - podzimni rozjimani (25).jpg?v=1', 'I v hustém porostu se dá najít jasný bod')">
            <div class="protection-layer"></div>
            <img src="img/2025.11.17 - podzimni rozjimani (25).jpg?v=1" alt="Bílé květy" draggable="false">
        </div>

        <div class="grid-item" onclick="openLightbox('img/2025.11.17 - podzimni rozjimani (3).jpg?v=1', 'Někdy stačí jedna kapka, aby se v ní zrcadlilo vše podstatné')">
            <div class="protection-layer"></div>
            <img src="img/2025.11.17 - podzimni rozjimani (3).jpg?v=1" alt="Kapky s odrazem" draggable="false">
        </div>

        <div class="grid-item" onclick="openLightbox('img/2025.11.18 - prochazka Prahou (10).jpg?v=1', 'Když se do cesty opře světlo, i obyčejný list začne vyprávět příběh')">
            <div class="protection-layer"></div>
            <img src="img/2025.11.18 - prochazka Prahou (10).jpg?v=1" alt="Zlatavý list" draggable="false">
        </div>
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close-btn" onclick="closeLightbox()">&times;</span>
    <div class="lightbox-content">
        <div style="position: relative; display: flex; justify-content: center;">
            <div class="protection-layer"></div>
            <img id="lightbox-img" src="" draggable="false">
        </div>
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>
</div>

<footer>
    © 2026 MIMO TRASU | Martin | Bez filtru.
</footer>

<script>
    let mybutton = document.getElementById("backToTop");
    window.onscroll = function() {
        if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
            mybutton.style.display = "block";
        } else {
            mybutton.style.display = "none";
        }
    };

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function openLightbox(src, caption) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox-caption').innerText = caption;
        document.getElementById('lightbox').style.display = 'grid';
        setTimeout(() => { document.getElementById('lightbox').classList.add('active'); }, 10);
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        setTimeout(() => { document.getElementById('lightbox').style.display = 'none'; }, 300);
        document.body.style.overflow = 'auto';
    }

    document.onkeydown = function(e) {
        if(e.keyCode == 27) closeLightbox();
    }
</script>

</body>
</html>
